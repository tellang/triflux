name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # npm ci fail (lock sync mismatch — e.g. @emnapi/core peer dep platform skew) 시
        # npm install fallback. deterministic 손실 trade-off 있으나 CI 미실행 보다 낫다.
        run: npm ci || npm install --no-audit --no-fund

      - name: Codex config stability guard
        run: npm run test:guard-codex-config

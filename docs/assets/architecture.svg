<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="480">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c0956c"/>
    </linearGradient>
    <linearGradient id="codex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8c6d"/>
    </linearGradient>
    <linearGradient id="gemini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#3b78e7"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
    <linearGradient id="skills" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#db6d28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="url(#bg)"/>
  <rect width="800" height="480" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="800" y2="80" stroke="#e6edf3" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#e6edf3" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#e6edf3" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#e6edf3" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#e6edf3" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="16" font-weight="bold">triflux Architecture</text>
  <text x="400" y="50" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="11">Tri-CLI Consensus Intelligence + Hub IPC</text>

  <!-- ===== User / Claude Code ===== -->
  <rect x="290" y="64" width="220" height="34" rx="8" fill="#161b22" stroke="#e6edf3" stroke-width="1.2"/>
  <circle cx="314" cy="81" r="5" fill="#e6edf3" opacity="0.6"/>
  <text x="400" y="86" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="12" font-weight="bold">User / Claude Code</text>

  <!-- Arrow: User → Skills -->
  <line x1="400" y1="98" x2="400" y2="116" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="394,113 400,121 406,113" fill="#8b949e"/>

  <!-- ===== Skills Layer ===== -->
  <rect x="40" y="122" width="720" height="82" rx="10" fill="#1c1510" stroke="#f0883e" stroke-width="1.5" filter="url(#softglow)"/>
  <text x="400" y="142" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="13" font-weight="bold">Skills Layer</text>

  <!-- Domain pills row 1 -->
  <rect x="55" y="150" width="84" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="97" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">Research 4</text>

  <rect x="148" y="150" width="84" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="190" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">Analysis 2</text>

  <rect x="241" y="150" width="84" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="283" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">Execution 3</text>

  <rect x="334" y="150" width="60" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="364" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">QA 2</text>

  <rect x="403" y="150" width="80" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="443" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">Planning 2</text>

  <rect x="492" y="150" width="74" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="529" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">Review 2</text>

  <rect x="575" y="150" width="74" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="612" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">Debate 2</text>

  <rect x="658" y="150" width="86" height="20" rx="10" fill="#f0883e" opacity="0.12" stroke="#f0883e" stroke-width="0.5"/>
  <text x="701" y="164" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9">Persist 2</text>

  <!-- Infrastructure label -->
  <text x="400" y="192" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">+ 12 Infrastructure: consensus, hub, multi, auto, setup, doctor, profile, index, forge, ...</text>

  <!-- ===== Branching Arrows ===== -->
  <!-- Left: → Consensus -->
  <path d="M300,204 L300,215 L220,235" stroke="#f0883e" stroke-width="1.5" fill="none"/>
  <polygon points="217,230 215,239 224,235" fill="#f0883e"/>
  <text x="230" y="228" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Deep Skills</text>

  <!-- Right: → Hub -->
  <path d="M500,204 L500,215 L580,235" stroke="#a371f7" stroke-width="1.5" fill="none"/>
  <polygon points="576,231 584,238 580,229" fill="#a371f7"/>
  <text x="570" y="228" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">IPC / Delegation</text>

  <!-- ===== Consensus Engine (Left) ===== -->
  <rect x="30" y="242" width="380" height="190" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="220" y="264" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="12" font-weight="bold">Consensus Engine</text>
  <text x="220" y="280" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Anti-Herding  |  Cross-Validation  |  Consensus Gate</text>

  <!-- FAIL → Resolve (loop) — behind CLI boxes -->
  <line x1="168" y1="413" x2="72" y2="413" stroke="#f85149" stroke-width="1" stroke-dasharray="3"/>
  <path d="M72,413 L52,413 L52,310 L50,310" stroke="#f85149" stroke-width="1" stroke-dasharray="3" fill="none"/>
  <text x="60" y="365" fill="#f85149" font-family="SF Mono,Consolas,monospace" font-size="7" transform="rotate(-90,60,365)">RETRY</text>

  <!-- 3 CLI boxes -->
  <rect x="50" y="292" width="105" height="56" rx="6" fill="#1c1917" stroke="#d4a574" stroke-width="1.2"/>
  <circle cx="70" cy="308" r="6" fill="url(#claude)"/>
  <text x="84" y="312" fill="#d4a574" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">Claude</text>
  <text x="58" y="328" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Opus / Sonnet</text>
  <text x="58" y="340" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Architecture</text>

  <rect x="168" y="292" width="105" height="56" rx="6" fill="#0d1f17" stroke="#10a37f" stroke-width="1.2"/>
  <circle cx="188" cy="308" r="6" fill="url(#codex)"/>
  <text x="202" y="312" fill="#10a37f" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">Codex</text>
  <text x="176" y="328" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">CLI (gpt-5.3)</text>
  <text x="176" y="340" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Security/Perf</text>

  <rect x="286" y="292" width="105" height="56" rx="6" fill="#0d1520" stroke="#4285f4" stroke-width="1.2"/>
  <circle cx="306" cy="308" r="6" fill="url(#gemini)"/>
  <text x="320" y="312" fill="#4285f4" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">Gemini</text>
  <text x="294" y="328" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Flash 3</text>
  <text x="294" y="340" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">UX / Docs</text>

  <!-- ISOLATED badges -->
  <rect x="73" y="282" width="52" height="13" rx="6" fill="#da3633" opacity="0.7"/>
  <text x="99" y="292" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="7" font-weight="bold">ISOLATED</text>
  <rect x="194" y="282" width="52" height="13" rx="6" fill="#da3633" opacity="0.7"/>
  <text x="220" y="292" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="7" font-weight="bold">ISOLATED</text>
  <rect x="312" y="282" width="52" height="13" rx="6" fill="#da3633" opacity="0.7"/>
  <text x="338" y="292" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="7" font-weight="bold">ISOLATED</text>

  <!-- Merge lines to cross-validation -->
  <line x1="102" y1="348" x2="160" y2="370" stroke="#d4a574" stroke-width="1" stroke-dasharray="3"/>
  <line x1="220" y1="348" x2="200" y2="370" stroke="#10a37f" stroke-width="1" stroke-dasharray="3"/>
  <line x1="338" y1="348" x2="240" y2="370" stroke="#4285f4" stroke-width="1" stroke-dasharray="3"/>

  <!-- Cross-validation bar -->
  <rect x="130" y="366" width="140" height="20" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="200" y="380" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Cross-Validate</text>

  <!-- Arrow to gate -->
  <line x1="200" y1="386" x2="200" y2="396" stroke="#f0883e" stroke-width="1.5"/>

  <!-- Consensus Gate diamond -->
  <polygon points="200,397 232,413 200,429 168,413" fill="#1c1510" stroke="#f0883e" stroke-width="1.5" filter="url(#glow)"/>
  <text x="200" y="416" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">&#8805;70%</text>

  <!-- PASS → Verified -->
  <line x1="232" y1="413" x2="310" y2="413" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="307,407 317,413 307,419" fill="#3fb950"/>
  <rect x="318" y="401" width="82" height="24" rx="5" fill="#0d1f17" stroke="#238636" stroke-width="1"/>
  <text x="359" y="417" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">VERIFIED</text>

  <!-- ===== Hub Server (Right) ===== -->
  <rect x="430" y="242" width="340" height="190" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="264" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="12" font-weight="bold">Hub Server</text>
  <text x="600" y="280" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Named Pipe  |  HTTP  |  MCP Bridge</text>

  <!-- SQLite Store -->
  <rect x="450" y="292" width="92" height="50" rx="6" fill="#1a1128" stroke="#a371f7" stroke-width="1"/>
  <text x="496" y="313" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">SQLite</text>
  <text x="496" y="328" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Task Store</text>
  <text x="496" y="338" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">Weights/History</text>

  <!-- QoS Dashboard -->
  <rect x="554" y="292" width="92" height="50" rx="6" fill="#1a1128" stroke="#a371f7" stroke-width="1"/>
  <text x="600" y="313" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">QoS</text>
  <text x="600" y="328" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Dashboard</text>
  <text x="600" y="338" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">Latency/Health</text>

  <!-- Delegator -->
  <rect x="658" y="292" width="92" height="50" rx="6" fill="#1a1128" stroke="#a371f7" stroke-width="1"/>
  <text x="704" y="313" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">Delegator</text>
  <text x="704" y="328" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Routing</text>
  <text x="704" y="338" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="7">Model Selection</text>

  <!-- psmux / tmux -->
  <rect x="450" y="356" width="145" height="38" rx="6" fill="#1a1128" stroke="#a371f7" stroke-width="0.8" stroke-dasharray="4"/>
  <text x="522" y="374" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">psmux / tmux</text>
  <text x="522" y="387" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">Multi-Pane Terminal</text>

  <!-- MCP Bridge -->
  <rect x="608" y="356" width="145" height="38" rx="6" fill="#1a1128" stroke="#a371f7" stroke-width="0.8" stroke-dasharray="4"/>
  <text x="680" y="374" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="9" font-weight="bold">MCP Bridge</text>
  <text x="680" y="387" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="8">External Clients</text>

  <!-- Key features at bottom of Hub -->
  <rect x="468" y="402" width="64" height="16" rx="8" fill="#a371f7" opacity="0.12" stroke="#a371f7" stroke-width="0.5"/>
  <text x="500" y="413" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="7">tfx-multi</text>

  <rect x="540" y="402" width="58" height="16" rx="8" fill="#a371f7" opacity="0.12" stroke="#a371f7" stroke-width="0.5"/>
  <text x="569" y="413" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="7">tfx-auto</text>

  <rect x="606" y="402" width="80" height="16" rx="8" fill="#a371f7" opacity="0.12" stroke="#a371f7" stroke-width="0.5"/>
  <text x="646" y="413" text-anchor="middle" fill="#a371f7" font-family="SF Mono,Consolas,monospace" font-size="7">remote-spawn</text>

  <!-- ===== Footer ===== -->
  <text x="400" y="460" text-anchor="middle" fill="#484f58" font-family="SF Mono,Consolas,monospace" font-size="9">triflux v8.4 — Tri-CLI Orchestration with Consensus Intelligence</text>
  <text x="400" y="473" text-anchor="middle" fill="#484f58" font-family="SF Mono,Consolas,monospace" font-size="8">33 Skills  |  9 Domains  |  Deep/Light Variants  |  Windows Native</text>
</svg>
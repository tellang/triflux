<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="420">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c0956c"/>
    </linearGradient>
    <linearGradient id="codex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8c6d"/>
    </linearGradient>
    <linearGradient id="gemini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#3b78e7"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#db6d28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="url(#bg)"/>
  <rect width="800" height="420" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="16" font-weight="bold">Tri-CLI Consensus Engine</text>
  <text x="400" y="56" text-anchor="middle" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="11">Anti-Herding → Cross-Validation → Consensus Gate</text>

  <!-- Phase 1: Independent Analysis -->
  <text x="30" y="95" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">PHASE 1: INDEPENDENT</text>
  <rect x="20" y="75" width="155" height="18" rx="3" fill="none" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- Loop arrow from Resolve back up — behind CLI boxes -->
  <path d="M100,370 L70,370 L70,150 L130,150" stroke="#f85149" stroke-width="1" stroke-dasharray="4" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Claude Box -->
  <rect x="30" y="110" width="200" height="80" rx="8" fill="#1c1917" stroke="#d4a574" stroke-width="1.5"/>
  <circle cx="52" cy="130" r="8" fill="url(#claude)"/>
  <text x="65" y="134" fill="#d4a574" font-family="SF Mono,Consolas,monospace" font-size="12" font-weight="bold">Claude Opus</text>
  <text x="42" y="155" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Architecture / Design</text>
  <text x="42" y="170" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Logic / Patterns</text>
  <rect x="42" y="176" width="60" height="4" rx="2" fill="#d4a574" opacity="0.3"/>
  <rect x="42" y="176" width="45" height="4" rx="2" fill="#d4a574" opacity="0.7"/>

  <!-- Codex Box -->
  <rect x="300" y="110" width="200" height="80" rx="8" fill="#0d1f17" stroke="#10a37f" stroke-width="1.5"/>
  <circle cx="322" cy="130" r="8" fill="url(#codex)"/>
  <text x="335" y="134" fill="#10a37f" font-family="SF Mono,Consolas,monospace" font-size="12" font-weight="bold">Codex CLI</text>
  <text x="312" y="155" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Security / Performance</text>
  <text x="312" y="170" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Implementation</text>
  <rect x="312" y="176" width="60" height="4" rx="2" fill="#10a37f" opacity="0.3"/>
  <rect x="312" y="176" width="50" height="4" rx="2" fill="#10a37f" opacity="0.7"/>

  <!-- Gemini Box -->
  <rect x="570" y="110" width="200" height="80" rx="8" fill="#0d1520" stroke="#4285f4" stroke-width="1.5"/>
  <circle cx="592" cy="130" r="8" fill="url(#gemini)"/>
  <text x="605" y="134" fill="#4285f4" font-family="SF Mono,Consolas,monospace" font-size="12" font-weight="bold">Gemini CLI</text>
  <text x="582" y="155" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">UX / Documentation</text>
  <text x="582" y="170" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="9">Accessibility</text>
  <rect x="582" y="176" width="60" height="4" rx="2" fill="#4285f4" opacity="0.3"/>
  <rect x="582" y="176" width="40" height="4" rx="2" fill="#4285f4" opacity="0.7"/>

  <!-- Anti-Herding badges -->
  <rect x="115" y="100" width="30" height="14" rx="7" fill="#da3633" opacity="0.8"/>
  <text x="130" y="110" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="7" font-weight="bold">ISOLATED</text>
  <rect x="385" y="100" width="30" height="14" rx="7" fill="#da3633" opacity="0.8"/>
  <text x="400" y="110" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="7" font-weight="bold">ISOLATED</text>
  <rect x="655" y="100" width="30" height="14" rx="7" fill="#da3633" opacity="0.8"/>
  <text x="670" y="110" text-anchor="middle" fill="#fff" font-family="SF Mono,Consolas,monospace" font-size="7" font-weight="bold">ISOLATED</text>

  <!-- Arrows down -->
  <line x1="130" y1="192" x2="130" y2="230" stroke="#d4a574" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="192" x2="400" y2="230" stroke="#10a37f" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="670" y1="192" x2="670" y2="230" stroke="#4285f4" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Phase 2: Cross-Validation -->
  <text x="30" y="225" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">PHASE 2: CROSS-VALIDATION</text>

  <rect x="80" y="235" width="640" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="258" text-anchor="middle" fill="#e6edf3" font-family="SF Mono,Consolas,monospace" font-size="11">Compare findings across 3 sources</text>

  <!-- Agreement indicators -->
  <rect x="150" y="268" width="100" height="18" rx="4" fill="#238636" opacity="0.2" stroke="#238636" stroke-width="0.5"/>
  <text x="200" y="280" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9">3/3 AGREE</text>

  <rect x="350" y="268" width="100" height="18" rx="4" fill="#238636" opacity="0.2" stroke="#238636" stroke-width="0.5"/>
  <text x="400" y="280" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="9">2/3 AGREE</text>

  <rect x="550" y="268" width="100" height="18" rx="4" fill="#da3633" opacity="0.15" stroke="#da3633" stroke-width="0.5"/>
  <text x="600" y="280" text-anchor="middle" fill="#f85149" font-family="SF Mono,Consolas,monospace" font-size="9">1/3 DISPUTED</text>

  <!-- Arrow down -->
  <line x1="400" y1="297" x2="400" y2="325" stroke="#f0883e" stroke-width="2"/>
  <polygon points="394,322 400,332 406,322" fill="#f0883e"/>

  <!-- Phase 3: Consensus Gate -->
  <text x="30" y="325" fill="#8b949e" font-family="SF Mono,Consolas,monospace" font-size="10" font-weight="bold">PHASE 3: CONSENSUS GATE</text>

  <!-- Gate diamond -->
  <polygon points="400,340 470,370 400,400 330,370" fill="#1c1510" stroke="#f0883e" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="367" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="11" font-weight="bold">Score</text>
  <text x="400" y="382" text-anchor="middle" fill="#f0883e" font-family="SF Mono,Consolas,monospace" font-size="11" font-weight="bold">≥ 70%?</text>

  <!-- Yes arrow -->
  <line x1="470" y1="370" x2="560" y2="370" stroke="#3fb950" stroke-width="2"/>
  <polygon points="557,364 567,370 557,376" fill="#3fb950"/>
  <rect x="570" y="355" width="130" height="30" rx="6" fill="#0d1f17" stroke="#238636" stroke-width="1.5"/>
  <text x="635" y="374" text-anchor="middle" fill="#3fb950" font-family="SF Mono,Consolas,monospace" font-size="11" font-weight="bold">VERIFIED OUTPUT</text>

  <!-- No arrow -->
  <line x1="330" y1="370" x2="240" y2="370" stroke="#f85149" stroke-width="2"/>
  <polygon points="243,364 233,370 243,376" fill="#f85149"/>
  <rect x="100" y="355" width="130" height="30" rx="6" fill="#1c0d0d" stroke="#da3633" stroke-width="1.5"/>
  <text x="165" y="374" text-anchor="middle" fill="#f85149" font-family="SF Mono,Consolas,monospace" font-size="11" font-weight="bold">RESOLVE ROUND</text>


</svg>